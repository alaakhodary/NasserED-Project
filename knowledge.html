<!doctype html>
<html lang="en" data-theme="" data-app="knowledge">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="app-base" content="" />
    <title>EMnasser | Medical References</title>

    <!-- Bootstrap 5 -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    />
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap"
      rel="stylesheet"
    />

    <!-- Styles -->
    <link rel="stylesheet" href="styles/styles.css" />
    <link rel="stylesheet" href="styles/knowledge.css" />
  </head>
  <body>
    <div id="layout-header-root"></div>

    <div class="page-wrap">
      <!-- ===== LIST PAGE ===== -->
      <div id="page-list">
        <!-- References Section Heading -->
        <div class="section-heading" style="margin-top: 24px">
          <span class="section-badge"
            ><i class="bi bi-journals"></i> References</span
          >
          <h2>Clinical References</h2>
          <div class="section-heading-line"></div>
        </div>

        <!-- Cards Grid -->
        <div class="cards-grid" id="cardsGrid"></div>

        <!-- Pagination -->
        <div class="pagination-wrap" id="paginationWrap"></div>
      </div>
      <!-- /#page-list -->

      <!-- ===== DETAIL PAGE ===== -->
      <div id="page-detail">
        <div class="back-bar">
          <button class="back-btn" id="backBtn">
            <i class="bi bi-arrow-left"></i> Back to all references
          </button>
          <div class="back-breadcrumb">
            References &rsaquo; <span id="bcSection"></span>
          </div>
        </div>
        <div class="detail-card">
          <div class="detail-header">
            <div class="detail-badges">
              <span class="detail-badge-cat" id="dCat"></span>
              <span class="detail-badge-sub" id="dSub"></span>
            </div>
            <h2 class="detail-title" id="dTitle"></h2>
          </div>
          <div class="detail-body">
            <div class="detail-section" id="dNotesWrap" style="display: none">
              <div class="ds-label">
                <i class="bi bi-card-text"></i> &nbsp;About This Reference
              </div>
              <div class="ds-value" id="dNotes"></div>
            </div>
            <div id="dLinkWrap" style="display: none">
              <div class="detail-divider"></div>
              <div class="detail-section">
                <div class="ds-label">
                  <i class="bi bi-link-45deg"></i> &nbsp;External Resource
                </div>
                <div class="detail-link-box">
                  <div class="dlb-url" id="dUrl"></div>
                  <a
                    class="btn-open-link"
                    id="dOpenLink"
                    href="#"
                    target="_blank"
                    rel="noopener noreferrer"
                  >
                    <i class="bi bi-box-arrow-up-right"></i> Visit Resource
                  </a>
                </div>
              </div>
            </div>
            <div class="detail-divider"></div>
            <div class="detail-meta-row">
              <div class="meta-chip">
                <i class="bi bi-calendar3"></i> <span id="dDate"></span>
              </div>
              <div class="meta-chip">
                <i class="bi bi-folder2"></i> <span id="dCategory"></span>
              </div>
              <div class="meta-chip">
                <i class="bi bi-tag"></i> <span id="dSubLabel"></span>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- /#page-detail -->
    </div>

    <div id="layout-footer-root"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="scripts/layout-loader.js"></script>
    <script type="module" src="scripts/app-knowledge.js"></script>
  </body>
</html>
