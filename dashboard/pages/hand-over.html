<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NasserED Dashboard | Hand Over</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem("dashboard-theme");
          if (t === "light" || t === "dark") document.documentElement.setAttribute("data-theme", t);
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="../css/dashboard-variables.css" />
    <link rel="stylesheet" href="simple-page-editor.css" />
    <link rel="stylesheet" href="../css/dashboard-theme.css" />
    <link rel="stylesheet" href="../css/dashboard-responsive.css" />
  </head>
  <body data-page-editor-config data-storage-key="dashboard-pages-hand-over-html" data-default-title="Hand Over">
    <div class="dashboard-shell">
      <aside class="sidebar">
        <a href="../../index.html" class="brand text-decoration-none">
          <img src="../../img/logo-dark.webp" alt="NasserED" data-dashboard-logo />
          <div><strong>NasserED</strong><small>NMC EMERGENCY DEPARTMENT</small></div>
        </a>
        <nav class="sidebar-nav"></nav>
        <div class="sidebar-theme-toggle-wrap px-1">
          <button type="button" class="dashboard-theme-toggle w-100 d-flex align-items-center justify-content-center gap-2" data-theme-toggle><i class="bi bi-sun-fill" aria-hidden="true"></i><span class="theme-toggle-label">Theme</span></button>
        </div>
        <div class="sidebar-footer">
          <span class="sidebar-footer-eyebrow">Support &amp; development</span>
          <span class="sidebar-footer-brand">UK-MED</span>
          <span class="sidebar-footer-year">&copy; 2026</span>
        </div>
      </aside>
      <main class="main-panel">
        <header class="topbar">
          <div class="topbar-left"><h1>Hand Over</h1><p>Dashboard / Pages / Hand Over</p></div>
          <div class="topbar-right"><span class="status-dot"></span><span class="status-label">Rich Editor</span></div>
        </header>
        <section class="editor-layout">
          <article class="panel-card">
            <div class="panel-head d-flex align-items-center justify-content-between gap-2 mb-3">
              <h2 class="mb-0">Hand Over Content</h2>
              <div class="d-flex gap-2 flex-wrap">
                <button class="btn btn-outline-light btn-sm" id="resetContentBtn" type="button"><i class="bi bi-arrow-counterclockwise"></i> Reset</button>
                <button class="btn btn-primary btn-sm" id="saveContentBtn" type="button"><i class="bi bi-floppy"></i> Save</button>
              </div>
            </div>
            <textarea id="simplePageEditor" class="rich-editor" aria-label="Hand Over rich editor"></textarea>
            <p class="editor-hint mb-0">Use TinyMCE toolbar controls, then press Save.</p>
          </article>
          <article class="panel-card">
            <div class="panel-head mb-3"><h2 class="mb-0">Live Preview</h2></div>
            <div id="simplePagePreview" class="preview-content"></div>
          </article>
        </section>
      </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tinymce@7/tinymce.min.js" referrerpolicy="origin"></script>
    <script src="../js/dashboard-theme.js"></script>
    <script src="simple-page-editor.js"></script>
  </body>
</html>
