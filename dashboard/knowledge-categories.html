<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NasserED Dashboard | Knowledge Categories</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem("dashboard-theme");
          if (t === "light" || t === "dark") document.documentElement.setAttribute("data-theme", t);
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="styled/dashboard-variables.css" />
    <link rel="stylesheet" href="styled/simple-page-editor.css" />
    <link rel="stylesheet" href="styled/knowledge.css" />
    <link rel="stylesheet" href="styled/knowledge-categories.css" />
    <link rel="stylesheet" href="styled/dashboard-theme.css" />
    <link rel="stylesheet" href="styled/dashboard-responsive.css" />
  </head>
  <body>
    <div class="dashboard-shell">
      <aside class="sidebar">
        <a href="../index.html" class="brand text-decoration-none">
          <img src="../img/logo-dark.webp" alt="NasserED" data-dashboard-logo />
          <div>
            <strong>NasserED</strong>
            <small>NMC EMERGENCY DEPARTMENT</small>
          </div>
        </a>
        <nav class="sidebar-nav">
          <p class="nav-title">Content Management</p>
        </nav>
        <div class="sidebar-theme-toggle-wrap px-1">
          <button type="button" class="dashboard-theme-toggle w-100 d-flex align-items-center justify-content-center gap-2" data-theme-toggle>
            <i class="bi bi-sun-fill" aria-hidden="true"></i>
            <span class="theme-toggle-label">Theme</span>
          </button>
        </div>
        <div class="sidebar-footer">
          <span class="sidebar-footer-eyebrow">Support &amp; development</span>
          <span class="sidebar-footer-brand">UK-MED</span>
          <span class="sidebar-footer-year">&copy; 2026</span>
        </div>
      </aside>
      <main class="main-panel">
        <header class="topbar">
          <div class="topbar-left">
            <h1>Knowledge Categories</h1>
            <p>Dashboard / Knowledge / Categories</p>
          </div>
          <div class="topbar-right">
            <span class="status-dot"></span>
            <span class="status-label">Categories</span>
          </div>
        </header>

        <nav class="knowledge-menu mb-3" aria-label="Knowledge sections">
          <button type="button" class="knowledge-menu-item active" data-knowledge-tab="categories">Categories</button>
          <button type="button" class="knowledge-menu-item" data-knowledge-tab="subcategories">Subcategories</button>
        </nav>

        <section class="content-grid knowledge-content-grid">
          <article class="panel-card panel-span-2 knowledge-panel active" data-knowledge-panel="categories">
            <div class="category-toolbar">
              <article class="protocol-total-card" aria-live="polite">
                <span class="protocol-total-label">Total Categories</span>
                <strong id="categoryTotalLabel">0</strong>
              </article>
              <button class="btn btn-primary btn-sm" id="openCategoryModalBtn" type="button"><i class="bi bi-plus-circle"></i> Add Categories</button>
            </div>
            <div id="categoryListWrap" class="table-wrap mt-2"></div>
          </article>

          <article class="panel-card panel-span-2 knowledge-panel" data-knowledge-panel="subcategories">
            <div class="category-toolbar">
              <article class="protocol-total-card" aria-live="polite">
                <span class="protocol-total-label">Total Subcategories</span>
                <strong id="subcategoryTotalLabel">0</strong>
              </article>
              <div class="subcategory-toolbar-controls">
                <label class="protocol-control-item">
                  <span>Filter Category</span>
                  <select id="subcategoryCategoryFilter" class="form-select form-select-sm">
                    <option value="all">All</option>
                  </select>
                </label>
                <button class="btn btn-primary btn-sm" id="openSubcategoryModalBtn" type="button"><i class="bi bi-plus-circle"></i> Add Sub category</button>
              </div>
            </div>
            <div id="subcategoryListWrap" class="table-wrap mt-2"></div>
          </article>
        </section>
      </main>
    </div>

    <div class="modal fade" id="categoryModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content bg-dark text-light border-secondary">
          <div class="modal-header border-secondary">
            <h5 class="modal-title" id="categoryModalLabel">Add Category</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <form id="categoryForm" novalidate>
            <div class="modal-body">
              <input type="hidden" id="categoryIdInput" />
              <label class="form-label" for="categoryNameInput">Category Name</label>
              <input id="categoryNameInput" class="form-control" type="text" placeholder="Category name" required />
            </div>
            <div class="modal-footer border-secondary">
              <button class="btn btn-outline-light" id="categoryResetBtn" type="button">Reset</button>
              <button class="btn btn-primary" type="submit"><i class="bi bi-floppy"></i> Save</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="categoryActionConfirmModal"
      tabindex="-1"
      aria-labelledby="categoryActionConfirmModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark text-light border-secondary">
          <div class="modal-header border-secondary">
            <h5 class="modal-title" id="categoryActionConfirmModalLabel">Confirm Action</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body" id="categoryActionConfirmModalBody">Are you sure?</div>
          <div class="modal-footer border-secondary">
            <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-danger" id="confirmCategoryActionBtn"><i class="bi bi-trash3"></i> Delete</button>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="subcategoryModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content bg-dark text-light border-secondary">
          <div class="modal-header border-secondary">
            <h5 class="modal-title" id="subcategoryModalLabel">Add Subcategory</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <form id="subcategoryForm" novalidate>
            <div class="modal-body row g-3">
              <input type="hidden" id="subcategoryIdInput" />
              <div class="col-12">
                <label class="form-label" for="subcategoryParentCategoryInput">Parent Category</label>
                <select id="subcategoryParentCategoryInput" class="form-select" required>
                  <option value="" selected disabled>Select category</option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label" for="subcategoryNameInput">Subcategory Name</label>
                <input id="subcategoryNameInput" class="form-control" type="text" placeholder="Subcategory name" required />
              </div>
            </div>
            <div class="modal-footer border-secondary">
              <button class="btn btn-outline-light" id="subcategoryResetBtn" type="button">Reset</button>
              <button class="btn btn-primary" type="submit"><i class="bi bi-floppy"></i> Save</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/dashboard-theme.js"></script>
    <script src="js/knowledge-categories.js"></script>
  </body>
</html>
